<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Someone ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Menghapus warna biru saat tombol di-tap di HP */
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            height: 100vh;
            background: linear-gradient(135deg, #ffe3f1, #ffcce6, #ffd3ec);
            overflow: hidden; /* Mengunci layar agar tidak bisa di-scroll di HP */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            perspective: 1000px;
        }

        /* Kartu dengan optimasi ukuran layar HP */
        .card {
            width: 100%;
            max-width: 360px; /* Lebar ideal untuk layar HP genggam */
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transform-style: preserve-3d;
            will-change: transform; /* Meningkatkan performa rendering di HP */
        }

        /* Foto 3D melayang */
        .photo-container {
            position: relative;
            display: inline-block;
            transform: translateZ(40px);
            margin-bottom: 10px;
        }

        .photo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 8px 20px rgba(255, 20, 147, 0.25);
        }

        h1 {
            color: #d1006f;
            margin: 10px 0 5px 0;
            font-size: 1.5rem;
            transform: translateZ(30px);
        }

        p {
            color: #5a2340;
            font-size: 0.95rem;
            transform: translateZ(25px);
            margin-bottom: 15px;
        }

        /* Message dengan ukuran font nyaman di HP */
        .message {
            margin: 15px 0;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #4a1532;
            font-style: italic;
        }

        /* Tombol yang nyaman di-tap jempol (Touch-friendly) */
        .btn {
            margin-top: 10px;
            padding: 14px 30px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(255, 20, 147, 0.3);
            transform: translateZ(35px);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        /* Animasi feedback saat tombol di-tap di HP */
        .btn:active {
            transform: translateZ(25px) scale(0.95);
            box-shadow: 0 4px 10px rgba(255, 20, 147, 0.2);
        }

        #start .btn {
            animation: pulse 2s infinite;
        }

        .hidden {
            display: none;
            opacity: 0;
        }

        .show-animated {
            display: block !important;
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
        }

        .answer {
            margin-top: 20px;
            font-size: 20px;
            color: #d1006f;
            font-weight: bold;
            line-height: 1.4;
        }

        /* Animasi Kelopak 3D (dioptimalkan agar ringan di chipset HP) */
        .heart {
            position: fixed;
            font-size: 20px;
            pointer-events: none;
            top: -30px;
            z-index: 99;
            animation: fall3D linear infinite;
            will-change: transform;
        }

        @keyframes fall3D {
            0% {
                transform: translateY(0) rotateX(0deg) rotateY(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) rotateX(360deg) rotateY(360deg);
                opacity: 0.2;
            }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 20, 147, 0.6); }
            70% { box-shadow: 0 0 0 12px rgba(255, 20, 147, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 20, 147, 0); }
        }

        @keyframes popUp {
            from { opacity: 0; transform: scale(0.9) translateZ(0); }
            to { opacity: 1; transform: scale(1) translateZ(20px); }
        }

        /* Musik Player Player Spotify disesuaikan agar rapi di HP */
        iframe {
            margin-top: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transform: translateZ(15px);
            height: 80px; /* Diperkecil menjadi mode compact agar tidak makan tempat */
        }
    </style>
</head>
<body>

    <!-- Menambahkan gyroscope untuk HP (gyroscope: true) -->
    <div class="card" data-tilt data-tilt-max="15" data-tilt-speed="800" data-tilt-gyroscope="true" data-tilt-glare="true" data-tilt-max-glare="0.15">
        
        <div class="photo-container">
            <img src="https://i.ibb.co/mCbFnx4Q/26d66bdf9016818aa6b5957bf8e1b4cb.jpg" class="photo" alt="Someone">
        </div>

        <h1>🌸 Digital Gift 🌸</h1>
        <p>From <b>Doni</b>

        <div id="start">
            <button class="btn" onclick="openGift()">Open My Gift 💖</button>
        </div>

        <div id="gift" class="hidden">
            <div class="message">
                “I’ve been thinking about us lately, and I just can't keep my feelings to myself anymore. <br>
                I really like you, and I want to be there for you as more than just a friend. <br>
                <strong>Will you be my girlfriend?</strong>”
            </div>

            <!-- Spotify mode compact (height=80) biar pas di layar HP pendek -->
            <iframe src="https://open.spotify.com/embed/track/440H25G5ApUQu9YIRnGh6L?utm_source=generator&theme=0"
                    width="100%" height="80" frameBorder="0"
                    allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
            </iframe>

            <div style="margin-top: 15px;">
                <button class="btn" onclick="yesAnswer()">💖 Yes, I Will</button>
            </div>

            <div id="answer" class="answer hidden">
                🌹 Thank You Someone 🌹<br>
                <span style="font-size: 15px; font-weight: normal; color: #5a2340;">You just made Doni the happiest person today ❤️</span>
            </div>
        </div>
    </div>

    <!-- Library Vanilla-Tilt (Mendukung respon kemiringan Gyroscope HP) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
        function openGift(){
            document.getElementById('start').style.display = 'none';
            const giftDiv = document.getElementById('gift');
            giftDiv.classList.remove('hidden');
            giftDiv.classList.add('show-animated');
        }

        function yesAnswer() {
            const answerDiv = document.getElementById('answer');
            answerDiv.classList.remove('hidden');
            answerDiv.classList.add('show-animated');
            createCelebrationParticles();
        }

        // Animasi kelopak bunga (dibatasi jumlahnya agar tidak membuat HP lag)
        const items = ['🌸', '✨', '💖', '🌹'];
        const maxParticles = 20; // Jumlah pas untuk performa HP lancar

        for(let i = 0; i < maxParticles; i++){
            createParticle(false);
        }

        function createParticle(isCelebration) {
            const p = document.createElement('div');
            p.className = 'heart';
            p.innerHTML = items[Math.floor(Math.random() * items.length)];
            p.style.left = Math.random() * 95 + 'vw';
            
            const size = (Math.random() * 12 + 14); // Sedikit diperkecil untuk layar HP
            p.style.fontSize = size + 'px';
            
            if (isCelebration) {
                p.style.top = '-40px';
                p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                p.style.animationDelay = (Math.random() * 0.3) + 's';
            } else {
                p.style.top = -(size + 20) + 'px';
                p.style.animationDuration = (4 + Math.random() * 5) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
            }
            
            document.body.appendChild(p);

            setTimeout(() => {
                p.remove();
                if (!isCelebration) createParticle(false);
            }, parseFloat(p.style.animationDuration) * 1000);
        }

        function createCelebrationParticles() {
            for(let i = 0; i < 25; i++) {
                createParticle(true);
            }
        }
    </script>
</body>
</html>
